<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | GroTech AgriDrones Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <a href="index.html">
                    <img src="logo.svg" alt="GroTech AgriDrones Logo" class="login-logo">
                </a>
                <h1>Admin Sign In</h1>
                <p>Enter your credentials to access the dashboard</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>
                <div id="loginError" class="login-error"></div>
                <button type="submit" class="btn btn-primary btn-full">
                    <span>Sign In</span>
                </button>
            </form>
            <div class="login-footer">
                <a href="index.html">&larr; Back to Website</a>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
